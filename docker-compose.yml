services:
  mysql:
    image: mysql:8.0
    container_name: pricecompare-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pricecompare}
      MYSQL_USER: ${MYSQL_USER:-priceuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pricepass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pricecompare-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-priceuser}
      DB_PASSWORD: ${MYSQL_PASSWORD:-pricepass}
      DB_NAME: ${MYSQL_DATABASE:-pricecompare}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-72}
      BACKEND_PORT: 8080
      DEMO_ADMIN_EMAIL: ${DEMO_ADMIN_EMAIL:-admin@pricecompare.ru}
      DEMO_ADMIN_PASSWORD: ${DEMO_ADMIN_PASSWORD:-admin123}
      DEMO_USER_EMAIL: ${DEMO_USER_EMAIL:-user@pricecompare.ru}
      DEMO_USER_PASSWORD: ${DEMO_USER_PASSWORD:-user123}
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: pricecompare-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

volumes:
  mysql_data:
